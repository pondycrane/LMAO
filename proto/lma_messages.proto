syntax = "proto3";

package lma;

// Top-level envelope — oneof dispatches to the correct message type.
// Use Title="p:Envelope" in LXMF to signal protobuf-encoded Content.

message LMAOEnvelope {
  oneof payload {
    SensorReport    sensor  = 10;
    CommandRequest  command = 11;
    CommandAck      ack     = 12;
    TextMessage     text    = 20;
    AudioMessage    audio   = 21;
    ImageMessage    image   = 22;
    CallSignal      call    = 30;
  }
}

// --- IoT Sensor ---

message SensorReport {
  string node_id = 1;
  uint32 seq     = 2;
  float  battery = 3;
  repeated SensorReading readings = 4;
}

message SensorReading {
  uint32 sensor_id   = 1;
  float  value       = 2;
  string unit        = 3;
  uint64 timestamp_ms = 4;
}

// --- Commands ---

message CommandRequest {
  string cmd_id     = 1;
  string target     = 2;
  string action     = 3;
  map<string, string> params = 4;
  uint64 issued_ms  = 5;
  uint64 expires_ms = 6;
}

message CommandAck {
  string cmd_id     = 1;
  string node_id    = 2;
  bool   success    = 3;
  string message    = 4;
}

// --- Human Communication ---

message TextMessage {
  string node_id   = 1;
  string content   = 2;
  uint64 timestamp = 3;
}

message AudioMessage {
  string node_id       = 1;
  bytes  audio_data    = 2;
  string codec         = 3;  // e.g. "opus", "codec2"
  uint32 duration_ms   = 4;
  uint64 timestamp     = 5;
}

message ImageMessage {
  string node_id       = 1;
  bytes  image_data    = 2;
  string format        = 3;  // e.g. "webp", "jpeg"
  uint32 width         = 4;
  uint32 height        = 5;
  uint64 timestamp     = 6;
}

// --- Call Signaling ---

message CallSignal {
  enum Signal {
    OFFER     = 0;
    ANSWER    = 1;
    ICE       = 2;
    HANGUP    = 3;
    KEEPALIVE = 4;
  }
  Signal signal        = 1;
  string sdp_or_ice    = 2;
  string media_type    = 3;
}