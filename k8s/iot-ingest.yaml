# IoT Ingest Consumer — Persistent NATS→DuckDB K8s Deployment
#
# Deploys a single-replica consumer that subscribes to NATS JetStream
# and persists all sensor readings to DuckDB on a PersistentVolumeClaim.
# The consumer uses durable consumer name "iot-ingest" so that messages
# are never lost across pod restarts.
#
# Prerequisites:
#   - NATS server running in the cluster (k8s/nats-server.yaml)
#   - Docker image released to the local Docker registry:
#       ./docker/registry/manage.sh push-ingest
#     (see README §13 for local registry setup)
#   - K3s nodes configured to pull from the local registry
#     (/etc/rancher/k3s/registries.yaml — see README §13)
#
# Internal services are always deployed from the local Docker registry
# (192.168.0.36:5000) for a consistent release path.  Do not revert to
# a local/daemon-only image tag — cluster nodes cannot see the Pi's
# Docker daemon.
#
# Usage:
#   kubectl apply -f k8s/iot-ingest.yaml
#
# Note: MVP runs with no authentication (same trust model as NATS
# server). Token auth can be added later via a ConfigMap change.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iot-ingest-pvc
  namespace: default
  labels:
    app: iot-ingest-consumer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iot-ingest-config
  namespace: default
  labels:
    app: iot-ingest-consumer
data:
  NATS_SERVER: "nats://nats-server.default.svc.cluster.local:4222"
  DUCKDB_PATH: "/data/sensors.db"
  CONSUMER_NAME: "iot-ingest"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-ingest-consumer
  namespace: default
  labels:
    app: iot-ingest-consumer
spec:
  replicas: 1
  revisionHistoryLimit: 2
  # Recreate (not RollingUpdate): the consumer holds an exclusive DuckDB
  # file lock on the RWO PVC, so old and new pods must never run at the
  # same time — a rolling update deadlocks the rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: iot-ingest-consumer
  template:
    metadata:
      labels:
        app: iot-ingest-consumer
    spec:
      containers:
        - name: consumer
          image: 192.168.0.36:5000/lmao-iot-ingest:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: iot-ingest-config
          volumeMounts:
            - name: duckdb-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import os; os.kill(1, 0)"
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import lma_core.queue, lma_core.storage; print('ready')"
            initialDelaySeconds: 5
            periodSeconds: 10
            # Importing duckdb takes ~4s on ARM — 2s times out every probe
            # and the rollout never completes.
            timeoutSeconds: 10
      volumes:
        - name: duckdb-data
          persistentVolumeClaim:
            claimName: iot-ingest-pvc