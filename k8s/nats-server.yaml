# NATS Server — Minimal JetStream Deployment
#
# Deploys a single-node NATS server with JetStream persistence
# inside the cluster. K8s pods publish/consume messages via
# the nats-server Service at:
#   nats-server.default.svc.cluster.local:4222
#
# JetStream data is stored on a PersistentVolumeClaim for durability
# across pod restarts.  If the PVC stays Pending because no default
# StorageClass is available (common on bare-metal or Raspi K8s),
# install a local-path provisioner:
#   kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml
#
# Usage:
#   kubectl apply -f k8s/nats-server.yaml
#
# Note: MVP runs with no authentication (same trust model as the
# existing insecure gRPC channel). Token auth can be added later
# via a ConfigMap change.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-js-pvc
  namespace: default
  labels:
    app: nats-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-server-config
  namespace: default
  labels:
    app: nats-server
data:
  nats.conf: |
    jetstream {
      store_dir: "/data"
      max_memory_store: 256MB
      max_file_store: 1GB
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-server
  namespace: default
  labels:
    app: nats-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats-server
  template:
    metadata:
      labels:
        app: nats-server
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "--js"
            - "--config"
            - "/etc/nats/nats.conf"
          ports:
            - containerPort: 4222
              name: client
              protocol: TCP
          volumeMounts:
            - name: nats-config
              mountPath: /etc/nats
              readOnly: true
            - name: nats-js-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nats-config
          configMap:
            name: nats-server-config
        - name: nats-js-data
          persistentVolumeClaim:
            claimName: nats-js-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: nats-server
  namespace: default
  labels:
    app: nats-server
spec:
  type: ClusterIP
  ports:
    - port: 4222
      targetPort: 4222
      protocol: TCP
      name: client
  selector:
    app: nats-server
